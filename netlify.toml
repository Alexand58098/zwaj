# إعدادات Netlify لمشروع TifoTV
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /bein → /.netlify/functions/bein
[[redirects]]
  from = "/bein"
  to = "/.netlify/functions/bein"
  status = 200
  force = true

[[redirects]]
  from = "/bein/*"
  to = "/.netlify/functions/bein"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
